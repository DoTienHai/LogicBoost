{% extends "base.html" %}

{% block title %}Playing - Quick Mini Game - LogicBoost{% endblock %}

{% block extra_css %}
<!-- KaTeX for LaTeX rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<!-- Mini Game Styles -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/mini_game.css') }}">
{% endblock %}

{% block content %}
<div class="mini-game-play-container">
    <!-- Game Header -->
    <div class="game-header">
        <div class="timer-box">
            <div class="timer" id="timer">60</div>
            <span class="timer-label">seconds</span>
        </div>
        <div class="score-box">
            <span class="score-label">Score:</span>
            <span class="score" id="score">0</span>
        </div>
    </div>

    <!-- Loading indicator (outside question-section so it won't be destroyed by innerHTML) -->
    <div id="loading" class="loading" style="display: none;">Loading question...</div>

    <!-- Question Display -->
    <div class="question-section" id="question-section">
    </div>

    <!-- Answer Input Area -->
    <div class="answer-section" id="answer-section" style="display: none;">
        <div class="options" id="options"></div>
        <input type="text" id="text-answer" placeholder="Type your answer..." style="display: none;" onkeypress="if(event.key==='Enter') submitMiniAnswer()">
        <button onclick="submitMiniAnswer()" class="btn btn-primary btn-large">Submit Answer</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="game-over-screen" style="display: none;">
        <h2>Game Over!</h2>
        <div class="final-score">
            <p>Your Score: <span id="final-score">0</span></p>
        </div>
        <div class="answer-review" id="answer-review"></div>
        <div class="buttons">
            <button onclick="playAgain()" class="btn btn-primary">Play Again</button>
            <a href="{{ url_for('mini_game.index') }}" class="btn btn-secondary">Back to Lobby</a>
        </div>
    </div>
</div>

<!-- Markdown and LaTeX libraries -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<!-- Mini Game Logic -->
<script>
    // Set API URLs for mini_game.js
    window.miniGameApiUrl = '{{ url_for("mini_game.question") }}';
    window.miniGameSubmitUrl = '{{ url_for("mini_game.submit_answer") }}';
</script>
<script src="{{ url_for('static', filename='js/mini_game.js') }}"></script>

{% endblock %}
